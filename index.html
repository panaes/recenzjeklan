<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recenzje z Klanu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #171717;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --text: #f0ede8;
    --muted: #888;
    --accent: #c9a84c;
    --accent2: #8a6f35;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  /* HEADER */
  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  .header-meta {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
  }

  .header-meta strong {
    color: var(--text);
    font-weight: 500;
  }

  /* SEARCH */
  .search-wrap {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent2);
  }

  .search-wrap input::placeholder { color: var(--muted); }

  /* LAYOUT */
  .layout {
    display: flex;
    position: relative;
  }

  /* SIDEBAR */
  .alpha-sidebar {
    width: 52px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0;
    gap: 2px;
    scrollbar-width: none;
  }

  .alpha-sidebar::-webkit-scrollbar { display: none; }

  .alpha-btn {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    width: 32px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    user-select: none;
  }

  .alpha-btn.has-items {
    color: var(--text);
  }

  .alpha-btn.has-items:hover {
    background: var(--surface2);
    color: var(--accent);
  }

  .alpha-btn.active {
    background: var(--accent);
    color: #000;
  }

  .alpha-btn.disabled {
    color: #333;
    cursor: default;
    font-size: 10px;
  }

  /* MAIN */
  .main-content {
    flex: 1;
    padding: 2rem;
    min-width: 0;
  }

  /* SECTION */
  .section {
    margin-bottom: 3rem;
    scroll-margin-top: 1rem;
  }

  .section-letter {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 1rem;
  }

  /* REVIEW CARD */
  .review-card {
    display: flex;
    gap: 1.25rem;
    padding: 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    transition: border-color 0.2s, background 0.2s;
    align-items: flex-start;
  }

  .review-card:hover {
    border-color: var(--accent2);
    background: var(--surface2);
  }

  /* COVER */
  .cover {
    width: 72px;
    height: 72px;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* REVIEW INFO */
  .review-info {
    flex: 1;
    min-width: 0;
  }

  .review-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .review-artist {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .review-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .review-meta span {
    margin-right: 10px;
  }



  .review-byline {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .review-publication {
    color: var(--accent);
    font-style: italic;
  }

  .review-text {
    font-size: 13px;
    color: #aaa;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* GENRE TAG */
  .genre-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent2);
    border: 1px solid var(--accent2);
    border-radius: 20px;
    padding: 2px 8px;
    margin-right: 6px;
    margin-top: 2px;
  }

  /* EMPTY STATE */
  .empty {
    padding: 3rem 0;
    color: var(--muted);
    font-size: 14px;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    font-size: 12px;
    color: #444;
    text-align: center;
  }

  @media (max-width: 600px) {
    .alpha-sidebar { width: 36px; }
    .alpha-btn { width: 24px; font-size: 10px; }
    header { padding: 2rem 1rem 1.5rem; }
    .main-content { padding: 1.5rem 1rem; }
    .cover { width: 56px; height: 56px; }
  }
</style>
</head>
<body>

<header>
  <h1>Moje<br>recenzje <span>muzyczne</span></h1>
  <div class="header-meta">
    <strong id="total-count">0</strong> recenzji
  </div>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Szukaj wykonawcy lub albumu..." oninput="filterAndRender()" />
</div>

<div class="layout">
  <nav class="alpha-sidebar" id="sidebar"></nav>
  <main class="main-content" id="content"></main>
</div>

<footer>
  &copy; Recenzje z Klanu &mdash; zaktualizowano <span id="update-date"></span>
</footer>

<script>
/* =============================================
   TWOJE RECENZJE — edytuj tę tablicę!
   
   Każda recenzja to obiekt z polami:
   - album:    tytuł albumu (wymagane)
   - artist:   wykonawca (wymagane)
   - year:     rok wydania (wymagane)
   - genre:    gatunek, np. "Rock", "Jazz", "Elektronika"
   - rating:   ocena od 1 do 5
   - cover:    URL okładki (możesz wkleić link z internetu)
               lub "" jeśli nie masz okładki
   - text:     treść recenzji
   
   Żeby dodać nową recenzję, skopiuj jeden blok { ... }
   i wklej go przed ostatnim nawiasem ], zmieniając dane.
   Pamiętaj o przecinku między blokami!
============================================= */
const reviews = [
  {
    album: "Żeby było miło",
    artist: "Bolec",
    year: 1997,
    genre: "Hip-Hop",
    cover: "https://panaes.github.io/recenzje/covers/bolec-zeby_bylo_milo.jpg",  // wklej tu URL okładki, np. "https://panaes.github.io/recenzje/covers/okladka.jpg"
    author: "DJ Splif",
    publication: "Magazyn Klan nr 1 (1997)",
    text: "Rewelacyjna płyta. Prawdziwy rodzynek na polskim rynku hip-hopowym. Każdy numer na płycie niesie ze sobą ciekawą treść, złożoną ze świetnych rymów, które zaskakują swobodą ułożenia we frazie. Bolec pisząc najwyraźniej czuje się jak ryba w wodzie. Teksty są zarówno lekkie, jak i trudniejsze i ostre. Słowo wsparte jest solidnymi samplami i bardzo dobrym miksem. Ciekawe przeskoki od standardów (\"Lolita\", \"Mój czas\") do psychodelicznych wręcz trip-hop'owych brzmień (\"Dym\", \"Branża\"). Bolec naprawdę się postarał, jeśli wziąć pod uwagę, że muzyka i słowa na krążku są wyłącznie jego roboty. Mam nadzieję, że ta płyta spodoba wam się tak bardzo, jak mi. Na pewno nie można jej pominąć. 4/5"
  }
];

/* =============================================
   LOGIKA STRONY — nie musisz tego edytować
============================================= */

document.getElementById('update-date').textContent = new Date().toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' });

const PL_ALPHA = 'AĄBCĆDEĘFGHIJKLŁMNŃOÓPQRSŚTUVWXYZŹŻ'.split('');

function getKey(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '')[0].toUpperCase();
}



let filtered = [];

function filterAndRender() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = reviews.filter(r =>
    r.album.toLowerCase().includes(q) ||
    r.artist.toLowerCase().includes(q) ||
    (r.genre && r.genre.toLowerCase().includes(q))
  );
  render();
}

function render() {
  const content = document.getElementById('content');
  const sidebar = document.getElementById('sidebar');

  document.getElementById('total-count').textContent = filtered.length;

  const grouped = {};
  filtered.forEach(r => {
    const k = getKey(r.artist);
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(r);
  });
  Object.keys(grouped).forEach(k => grouped[k].sort((a, b) => a.artist.localeCompare(b.artist, 'pl')));

  const usedKeys = new Set(Object.keys(grouped));

  sidebar.innerHTML = PL_ALPHA.map(l => {
    const has = usedKeys.has(l);
    return `<div class="alpha-btn ${has ? 'has-items' : 'disabled'}" ${has ? `onclick="scrollTo('${l}')"` : ''}>${l}</div>`;
  }).join('');

  if (filtered.length === 0) {
    content.innerHTML = '<p class="empty">Brak recenzji pasujących do wyszukiwania.</p>';
    return;
  }

  const sorted = Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'pl'));
  content.innerHTML = sorted.map(k => `
    <section class="section" id="sec-${k}">
      <div class="section-letter">${k}</div>
      ${grouped[k].map(r => `
        <article class="review-card">
          <div class="cover">
            ${r.cover ? `<img src="${r.cover}" alt="${r.album}" loading="lazy">` : '🎵'}
          </div>
          <div class="review-info">
            <div class="review-title">${r.album}</div>
            <div class="review-artist">${r.artist}</div>
            <div class="review-meta">
              <span>${r.year}</span>
              ${r.genre ? `<span class="genre-tag">${r.genre}</span>` : ''}
            </div>
            ${(r.author || r.publication) ? `<div class="review-byline">${r.author ? `<span>${r.author}</span>` : ''}${r.author && r.publication ? ' &mdash; ' : ''}${r.publication ? `<span class="review-publication">${r.publication}</span>` : ''}</div>` : ''}
            ${r.text ? `<div class="review-text">${r.text}</div>` : ''}
          </div>
        </article>
      `).join('')}
    </section>
  `).join('');
}

function scrollTo(l) {
  document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const el = document.getElementById('sec-' + l);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active')), 1000);
}

filterAndRender();
</script>
</body>
</html>
